interface:
  display_name: "PRD Workflow"
  short_description: "Run a gated B-end PRD workflow"
  default_prompt: "Use $prd-workflow to align, draft, review, revise, validate, and deliver this PRD through the governed workflow."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "platform-default"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "No package-managed native hook; execute mandatory gates inline."
    claude: "Optional managed hooks; execute mandatory gates inline when absent."
