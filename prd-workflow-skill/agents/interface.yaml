interface:
  display_name: "PRD Workflow Skill"
  short_description: "Run a gated B-end PRD workflow"
  default_prompt: "Use $prd-workflow to move this requirement through write-before alignment, decision ledger, two-phase PRD writing, independent review, revision, and retrospective improvement proposals."
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "bash"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "semantic-source"
    claude: "semantic-source"
    generic: "neutral-source"
