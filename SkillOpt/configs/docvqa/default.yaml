_base_: ../_base_/default.yaml

model:
  reasoning_effort: medium

train:
  batch_size: 40
  accumulation: 1

gradient:
  minibatch_size: 8
  merge_batch_size: 8

optimizer:
  learning_rate: 4

env:
  name: docvqa
  skill_init: skillopt/envs/docvqa/skills/initial.md
  split_mode: split_dir
  split_dir: data/docvqa/splits
  data_path: ""
  split_output_dir: ""
  max_turns: 1
  max_completion_tokens: 16384
  workers: 16
  image_detail: auto
  limit: 0
